<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:var(--surface-subtle);display:flex;gap:18px}
.card{flex:1;background:#fff;border-radius:24px;padding:20px;box-shadow:var(--shadow-normal);display:flex;flex-direction:column;gap:12px;border:1px solid var(--line-subtle)}
.hero{aspect-ratio:16/9;border-radius:12px;background:linear-gradient(135deg,#0066FF 0%,#9747FF 100%)}
.company{display:flex;align-items:center;gap:8px;font:var(--font-caption);color:var(--label-alternative)}
.logo{width:20px;height:20px;border-radius:5px;background:var(--surface-muted);display:grid;place-items:center;font-weight:700;font-size:10px;color:var(--label-strong)}
.title{font:var(--font-heading-1);font-weight:700;letter-spacing:var(--font-heading-tracking);color:var(--label-strong)}
.meta{font:var(--font-caption);color:var(--label-alternative);display:flex;gap:10px}
.tags{display:flex;gap:6px;margin-top:auto}
.tag{font:var(--font-caption);font-weight:600;background:var(--c-blue-50);color:var(--c-blue-700);padding:3px 8px;border-radius:999px}
</style></head><body>
<div class="card">
  <div class="hero"></div>
  <div class="company"><div class="logo">W</div>Wanted Lab</div>
  <div class="title">Senior Product Designer</div>
  <div class="meta"><span>Seoul · Hybrid</span><span>·</span><span>5+ years</span></div>
  <div class="tags"><span class="tag">Design System</span><span class="tag">B2B</span></div>
</div>
<div class="card">
  <div class="hero" style="background:linear-gradient(135deg,#17171A 0%,#37383C 100%)"></div>
  <div class="company"><div class="logo">K</div>Kakao Enterprise</div>
  <div class="title">AI/ML Platform Engineer</div>
  <div class="meta"><span>Pangyo · Remote OK</span><span>·</span><span>3+ years</span></div>
  <div class="tags"><span class="tag">Python</span><span class="tag">GPU</span></div>
</div>
</body></html>
