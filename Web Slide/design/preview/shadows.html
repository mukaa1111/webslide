<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:26px;background:#fff}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.card{background:#fff;border-radius:16px;height:90px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;font:var(--font-label-sm);font-weight:600;color:var(--label-strong)}
.hint{font:var(--font-caption);font-weight:500;color:var(--label-alternative)}
</style></head><body>
<div class="grid">
  <div class="card" style="box-shadow:var(--shadow-normal)">normal<span class="hint">resting card</span></div>
  <div class="card" style="box-shadow:var(--shadow-emphasize)">emphasize<span class="hint">hover card</span></div>
  <div class="card" style="box-shadow:var(--shadow-strong)">strong<span class="hint">popover / dropdown</span></div>
  <div class="card" style="box-shadow:var(--shadow-heavy)">heavy<span class="hint">modal / sheet</span></div>
</div>
</body></html>
