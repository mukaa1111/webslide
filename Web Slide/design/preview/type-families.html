<!doctype html>
<html><head><meta charset="utf-8"><title>Font families</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;display:grid;gap:18px}
.card{border:1px solid var(--line-subtle);border-radius:12px;padding:16px;display:flex;align-items:center;gap:20px}
.tag{font:var(--font-label-sm);font-weight:600;color:var(--label-alternative);width:120px;flex-shrink:0}
.sample{flex:1;color:var(--label-strong)}
.sample .en{display:block}.sample .ko{display:block;color:var(--label-neutral)}
.weights{font:var(--font-caption);color:var(--label-alternative);width:150px;flex-shrink:0;text-align:right}
</style></head><body>
<div class="card">
  <div class="tag">Primary</div>
  <div class="sample" style="font-family:var(--font-sans)">
    <span class="en" style="font-size:22px;font-weight:700;letter-spacing:-.02em">Pretendard — The quick brown fox 0123</span>
    <span class="ko" style="font-size:16px;font-weight:500">한국어 조판 · English — 9 weights, self-hosted</span>
  </div>
  <div class="weights">100 · 300 · 400 · 500 · 600 · 700 · 900</div>
</div>
<div class="card">
  <div class="tag">Display / Brand</div>
  <div class="sample" style="font-family:var(--font-display)">
    <span class="en" style="font-size:28px;font-weight:700;letter-spacing:-.035em">Wanted Sans — Bold by design</span>
    <span class="ko" style="font-size:15px;font-weight:500">원티드랩이 만든 오픈소스 디스플레이 서체</span>
  </div>
  <div class="weights">500 · 600 · 700 · 900</div>
</div>
<div class="card">
  <div class="tag">Mono</div>
  <div class="sample" style="font-family:var(--font-mono);color:var(--label-strong)">
    <span style="font-size:14px">const apply = await wanted.job('senior-designer').apply()</span>
  </div>
  <div class="weights">SF Mono · 500</div>
</div>
</body></html>
