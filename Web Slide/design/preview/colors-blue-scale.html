<!doctype html>
<html><head><meta charset="utf-8"><title>Blue scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:16px; background:#fff; }
  .ramp { display:grid; grid-template-columns: repeat(8, 1fr); gap:6px; }
  .sw { border-radius:8px; overflow:hidden; border:1px solid var(--line-subtle); }
  .chip { height:70px; }
  .meta { padding:6px 8px; font: var(--font-caption); color: var(--label-alternative); }
  .name { display:block; font: var(--font-label-sm); font-weight:600; color: var(--label-strong); }
</style></head>
<body>
<div class="ramp">
  <div class="sw"><div class="chip" style="background:var(--c-blue-50)"></div><div class="meta"><span class="name">50</span>EAF2FE</div></div>
  <div class="sw"><div class="chip" style="background:var(--c-blue-100)"></div><div class="meta"><span class="name">100</span>D5E4FD</div></div>
  <div class="sw"><div class="chip" style="background:var(--c-blue-200)"></div><div class="meta"><span class="name">200</span>AACAFC</div></div>
  <div class="sw"><div class="chip" style="background:var(--c-blue-300)"></div><div class="meta"><span class="name">300</span>7FB1FB</div></div>
  <div class="sw"><div class="chip" style="background:var(--c-blue-400)"></div><div class="meta"><span class="name">400</span>3385FF</div></div>
  <div class="sw"><div class="chip" style="background:var(--c-blue-500); outline:2px solid var(--c-blue-500); outline-offset:-2px;"></div><div class="meta"><span class="name">500 ★</span>0066FF</div></div>
  <div class="sw"><div class="chip" style="background:var(--c-blue-600)"></div><div class="meta" style="color:#d0d0d0"><span class="name" style="color:#fff">600</span>005EEB</div></div>
  <div class="sw"><div class="chip" style="background:var(--c-blue-800)"></div><div class="meta" style="color:#d0d0d0"><span class="name" style="color:#fff">800</span>003E99</div></div>
</div>
</body></html>
