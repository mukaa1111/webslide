<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;display:flex;flex-direction:column;gap:14px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{border:0;cursor:pointer;font:var(--font-body-md);font-weight:600;letter-spacing:var(--font-body-tracking);transition:background .15s,opacity .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary-normal);color:#fff;padding:12px 20px;border-radius:8px}
.btn-primary:hover{background:var(--primary-hover)}
.btn-secondary{background:var(--surface-muted);color:var(--label-strong);padding:12px 20px;border-radius:8px}
.btn-outline{background:#fff;color:var(--label-strong);border:1px solid var(--line-default);padding:11px 19px;border-radius:8px}
.btn-ghost{background:transparent;color:var(--label-normal);padding:12px 16px;border-radius:8px}
.btn-ghost:hover{background:var(--surface-subtle)}
.btn-danger{background:var(--c-red-400);color:#fff;padding:12px 20px;border-radius:8px}
.btn-sm{font:var(--font-body-sm);font-weight:600;padding:8px 14px}
.btn-lg{font:var(--font-body-lg);font-weight:600;padding:14px 24px}
.btn-pill{border-radius:999px}
.btn[disabled]{opacity:.4;cursor:not-allowed}
.lbl{font:var(--font-label-sm);font-weight:600;color:var(--label-alternative);width:70px;flex-shrink:0}
</style></head><body>
<div class="row"><span class="lbl">Primary</span>
  <button class="btn btn-primary btn-sm">Apply now</button>
  <button class="btn btn-primary">Apply now</button>
  <button class="btn btn-primary btn-lg">Apply now</button>
  <button class="btn btn-primary btn-pill">지원하기</button>
  <button class="btn btn-primary" disabled>Disabled</button>
</div>
<div class="row"><span class="lbl">Secondary</span>
  <button class="btn btn-secondary">Save for later</button>
  <button class="btn btn-outline">Share</button>
  <button class="btn btn-ghost">Cancel</button>
  <button class="btn btn-danger">Delete</button>
</div>
</body></html>
