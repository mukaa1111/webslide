<!doctype html>
<html><head><meta charset="utf-8"><title>Icon grid</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px}
.cell{aspect-ratio:1;border:1px solid var(--line-subtle);border-radius:10px;display:grid;place-items:center;color:var(--label-strong)}
.cell img{width:24px;height:24px}
.cell.blue{color:var(--primary-normal);background:var(--surface-primary-subtle);border-color:transparent}
.cell.violet{color:var(--c-violet-500);background:var(--c-violet-50);border-color:transparent}
</style></head><body>
<div class="grid">
  <div class="cell"><img src="../assets/icons/home.svg"></div>
  <div class="cell"><img src="../assets/icons/search.svg"></div>
  <div class="cell"><img src="../assets/icons/bell.svg"></div>
  <div class="cell"><img src="../assets/icons/bookmark.svg"></div>
  <div class="cell"><img src="../assets/icons/heart.svg"></div>
  <div class="cell"><img src="../assets/icons/person.svg"></div>
  <div class="cell"><img src="../assets/icons/briefcase.svg"></div>
  <div class="cell"><img src="../assets/icons/company.svg"></div>
  <div class="cell"><img src="../assets/icons/location.svg"></div>
  <div class="cell"><img src="../assets/icons/mail.svg"></div>
  <div class="cell"><img src="../assets/icons/document.svg"></div>
  <div class="cell"><img src="../assets/icons/bubble.svg"></div>

  <div class="cell"><img src="../assets/icons/calendar.svg"></div>
  <div class="cell"><img src="../assets/icons/clock.svg"></div>
  <div class="cell"><img src="../assets/icons/filter.svg"></div>
  <div class="cell"><img src="../assets/icons/setting.svg"></div>
  <div class="cell"><img src="../assets/icons/eye.svg"></div>
  <div class="cell"><img src="../assets/icons/eye-slash.svg"></div>
  <div class="cell"><img src="../assets/icons/star.svg"></div>
  <div class="cell"><img src="../assets/icons/pencil.svg"></div>
  <div class="cell"><img src="../assets/icons/trash.svg"></div>
  <div class="cell"><img src="../assets/icons/copy.svg"></div>
  <div class="cell"><img src="../assets/icons/share.svg"></div>
  <div class="cell"><img src="../assets/icons/link.svg"></div>

  <div class="cell"><img src="../assets/icons/check.svg"></div>
  <div class="cell"><img src="../assets/icons/close.svg"></div>
  <div class="cell"><img src="../assets/icons/plus.svg"></div>
  <div class="cell"><img src="../assets/icons/minus.svg"></div>
  <div class="cell"><img src="../assets/icons/arrow-right.svg"></div>
  <div class="cell"><img src="../assets/icons/arrow-left.svg"></div>
  <div class="cell"><img src="../assets/icons/chevron-down.svg"></div>
  <div class="cell"><img src="../assets/icons/chevron-right.svg"></div>
  <div class="cell"><img src="../assets/icons/menu.svg"></div>
  <div class="cell"><img src="../assets/icons/more-horizontal.svg"></div>
  <div class="cell blue"><img src="../assets/icons/sparkle-fill.svg"></div>
  <div class="cell violet"><img src="../assets/icons/thunder.svg"></div>
</div>
</body></html>
