<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px;background:#fff}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.cell{display:flex;flex-direction:column;gap:8px;align-items:center}
.box{width:100%;aspect-ratio:1.3;background:var(--surface-subtle);border:1px solid var(--line-subtle)}
.tag{font:var(--font-label-sm);font-weight:600;color:var(--label-strong)}
.px{font:var(--font-caption);color:var(--label-alternative)}
</style></head><body>
<div class="grid">
  <div class="cell"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="tag">xs</div><div class="px">4px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-md)"></div><div class="tag">md</div><div class="px">8px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="tag">lg</div><div class="px">12px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="tag">xl</div><div class="px">16px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-3xl)"></div><div class="tag">3xl</div><div class="px">24px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-card)"></div><div class="tag">card</div><div class="px">32px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="tag">pill</div><div class="px">full</div></div>
</div>
</body></html>
