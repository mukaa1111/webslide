<!doctype html>
<html><head><meta charset="utf-8"><title>Palette — Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:16px; background:#fff; }
  .row { display:grid; grid-template-columns: repeat(5, 1fr); gap:8px; }
  .sw { border-radius:10px; overflow:hidden; border:1px solid var(--line-subtle); }
  .sw .chip { height:58px; }
  .sw .meta { padding:6px 8px 8px; font: var(--font-caption); color: var(--label-alternative); }
  .sw .name { display:block; font: var(--font-label-sm); font-weight:600; color: var(--label-strong); }
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--c-blue-500)"></div><div class="meta"><span class="name">Blue 500</span>#0066FF · Primary</div></div>
  <div class="sw"><div class="chip" style="background:var(--c-violet-400)"></div><div class="meta"><span class="name">Violet 400</span>#9747FF · AI accent</div></div>
  <div class="sw"><div class="chip" style="background:var(--c-red-400)"></div><div class="meta"><span class="name">Red 400</span>#FF4242 · Negative</div></div>
  <div class="sw"><div class="chip" style="background:var(--c-green-400)"></div><div class="meta"><span class="name">Green 400</span>#00BF40 · Positive</div></div>
  <div class="sw"><div class="chip" style="background:var(--c-yellow-400)"></div><div class="meta"><span class="name">Yellow 400</span>#FFC800 · Caution</div></div>
</div>
</body></html>
